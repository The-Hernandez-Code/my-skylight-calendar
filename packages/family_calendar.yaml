# ==============================================================================
#  FAMILY CALENDAR BACKEND PACKAGE
# ==============================================================================
#  INSTRUCTIONS:
#  1. Place this file in your /config/packages/ folder.
#  2. Ensure your configuration.yaml has: 
#     homeassistant:
#       packages: !include_dir_named packages
#  3. RESTART Home Assistant.
# ==============================================================================

# 1. HELPERS (The Variables)
input_text:
  # Filter Toggles (RegEx: .* = Show, ^$ = Hide)
  calendar1_calendar_filter:
    name: Tony Filter
    initial: ".*"
  calendar2_calendar_filter:
    name: Rachel Filter
    initial: ".*"
  holidays_calendar_filter:
    name: Holidays Filter
    initial: ".*"

  # Event Form Data
  calendar_event_title:
    name: Event Title
    icon: mdi:format-title
  calendar_event_description:
    name: Event Description
    icon: mdi:text

input_select:
  # The dropdown list for "Who is this event for?"
  calendar_select:
    name: Select Calendar
    options:
      - Tony
      - Rachel
    icon: mdi:calendar-check
  
  # The View selector (Week, Month, etc)
  calendar_view:
    name: Calendar View
    options:
      - Today
      - Tomorrow
      - Week
      - Biweek
      - Month
    initial: Month

input_datetime:
  # Event start/end times
  calendar_event_start:
    has_date: true
    has_time: true
  calendar_event_end:
    has_date: true
    has_time: true
  calendar_day_event_start:
    has_date: true
    has_time: false
  calendar_day_event_end:
    has_date: true
    has_time: false

input_boolean:
  # UI Toggles
  calendar_all_day_event:
    name: All Day Event
    icon: mdi:calendar-clock
  family_calendar_show:
    name: Show Family Calendar

# 2. SCRIPTS (The Logic)
script:
  # --- Filter Toggles ---
  calendar1_calendar_visible_filter:
    alias: Toggle Tony Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar1_calendar_filter
        data:
          value: "{% if is_state('input_text.calendar1_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  calendar2_calendar_visible_filter:
    alias: Toggle Rachel Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar2_calendar_filter
        data:
          value: "{% if is_state('input_text.calendar2_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  holidays_calendar_visible_filter:
    alias: Toggle Holidays Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.holidays_calendar_filter
        data:
          value: "{% if is_state('input_text.holidays_calendar_filter', '.*') %}^${% else %}.*{% endif %}"

  # --- Add Event Logic ---
  add_google_calendar_event:
    alias: Process Add Calendar Event
    sequence:
      - variables:
          # ====================================================================
          # CONFIGURATION: ENTITY MAPPING
          # Map the Dropdown Name (Left) to your Entity ID (Right).
          # ====================================================================
          calendar_map:
            "Tony": "calendar.hansel_a_hernandez_gmail_com"
            "Rachel": "calendar.calendar2" # <--- REPLACE with Rachel's calendar entity once she shares with Tony's Gmail

          # Selects the entity based on the map above. Default to Tony if dropdown is somehow blank.
          target_calendar: "{{ calendar_map.get(states('input_select.calendar_select'), 'calendar.hansel_a_hernandez_gmail_com') }}"

      - choose:
          # Scenario A: All Day Event
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "on"
            sequence:
              - action: calendar.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  start_date: "{{ states('input_datetime.calendar_day_event_start') }}"
                  # Google all-day end is exclusive: a same-day pick must send end = start + 1 day.
                  end_date: >-
                    {% set s = states('input_datetime.calendar_day_event_start') %}
                    {% set e = states('input_datetime.calendar_day_event_end') %}
                    {% set use = e if e >= s else s %}
                    {{ (strptime(use, '%Y-%m-%d') + timedelta(days=1)).strftime('%Y-%m-%d') }}

          # Scenario B: Timed Event
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "off"
            sequence:
              - action: calendar.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  start_date_time: "{{ states('input_datetime.calendar_event_start') }}"
                  # Forgive end <= start (common given the form's default times) by bumping to start + 1h.
                  end_date_time: >-
                    {% set s = states('input_datetime.calendar_event_start') %}
                    {% set e = states('input_datetime.calendar_event_end') %}
                    {% if e > s %}{{ e }}{% else %}{{ (strptime(s, '%Y-%m-%d %H:%M:%S') + timedelta(hours=1)).strftime('%Y-%m-%d %H:%M:%S') }}{% endif %}

      # Cleanup and Close
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_title
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_description
        data:
          value: ""
      - action: browser_mod.close_popup
        data: {}