views:
- type: sections
  max_columns: 10
  title: Family Calendar
  path: family-calendar
  theme: Skylight
  sections:
  - type: grid
    cards:
    - type: horizontal-stack
      cards:
      - type: custom:better-moment-card
        parentStyle: 'line-height:normal;

          '
        moment:
        - parentStyle: 'font-size:1em; text-align:center; margin-top:12px; color: var(--sk-text-secondary); font-weight:500;

            '
          templateRaw: '{{moment format=cccc}}

            '
        - parentStyle: 'font-size:1.3em; text-align:center; margin-top:4px; color: var(--sk-text-primary); font-weight:500;

            '
          templateRaw: '{{moment format=LLLL dd, yyyy}}

            '
        - parentStyle: 'font-size:2.6em; text-align:center; margin-top:6px; color: var(--sk-text-primary); font-weight:600;
            line-height:1;

            '
          templateRaw: '{{moment format=HH:mm}}

            '
        card_mod:
          style: "ha-card {\n  height: 180px !important;\n  min-height: 180px !important;\n\
            \  max-height: 180px !important;\n  box-sizing: border-box !important;\n\
            \  display: flex !important;\n  flex-direction: column !important;\n  justify-content: center !important;\n}\n"
      - type: custom:weather-card
        entity: weather.colorado_springs
        current: true
        details: true
        forecast: false
        card_mod:
          style: "ha-card {\n  height: 180px !important;\n  min-height: 180px !important;\n\
            \  max-height: 180px !important;\n  box-sizing: border-box !important;\n\
            }\n.current {\n  margin-bottom: 1.8em !important;\n}\n.temp {\n  transform:\
            \ translateY(-32px) !important;\n}\n.tempc {\n  transform: translateY(-8px)\
            \ !important;\n}\n"
      - type: custom:clock-weather-card
        entity: weather.colorado_springs
        sun_entity: sun.sun
        forecast_rows: 5
        hide_today_section: true
        locale: en-US
        time_format: 12
        card_mod:
          style: "ha-card {\n  height: 180px !important;\n  min-height: 180px !important;\n\
            \  max-height: 180px !important;\n  box-sizing: border-box !important;\n  padding: 4px 12px !important;\n}\n"
      grid_options:
        columns: full
        rows: 3
    column_span: 10
    background:
      opacity: 0
  - type: grid
    cards:
    - type: horizontal-stack
      cards:
      - type: vertical-stack
        cards:
        - type: conditional
          conditions:
          - condition: state
            entity: input_text.calendar1_calendar_filter
            state: ".*"
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            name: Tony
            icon: mdi:account
            show_icon: true
            show_name: true
            tap_action:
              action: perform-action
              perform_action: script.calendar1_calendar_visible_filter
            styles: ".bubble-button-background { opacity: 1 !important; background-color: var(--calendar1-default-primary-color) !important; } .bubble-name, .bubble-state, .bubble-sub-button-name { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important; font-weight: 600 !important; font-size: 16px !important; } .bubble-icon { color: #ffffff !important; opacity: 1 !important; }"
        - type: conditional
          conditions:
          - condition: state
            entity: input_text.calendar1_calendar_filter
            state_not: ".*"
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            name: Tony
            icon: mdi:account
            show_icon: true
            show_name: true
            tap_action:
              action: perform-action
              perform_action: script.calendar1_calendar_visible_filter
            styles: ".bubble-button-background { opacity: 1 !important; background-color: var(--sk-button-inactive) !important; } .bubble-name, .bubble-state, .bubble-sub-button-name { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important; font-weight: 600 !important; font-size: 16px !important; } .bubble-icon { color: #ffffff !important; opacity: 1 !important; }"
      - type: vertical-stack
        cards:
        - type: conditional
          conditions:
          - condition: state
            entity: input_text.calendar2_calendar_filter
            state: ".*"
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            name: Rachel
            icon: mdi:account
            show_icon: true
            show_name: true
            tap_action:
              action: perform-action
              perform_action: script.calendar2_calendar_visible_filter
            styles: ".bubble-button-background { opacity: 1 !important; background-color: var(--calendar2-default-primary-color) !important; } .bubble-name, .bubble-state, .bubble-sub-button-name { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important; font-weight: 600 !important; font-size: 16px !important; } .bubble-icon { color: #ffffff !important; opacity: 1 !important; }"
        - type: conditional
          conditions:
          - condition: state
            entity: input_text.calendar2_calendar_filter
            state_not: ".*"
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            name: Rachel
            icon: mdi:account
            show_icon: true
            show_name: true
            tap_action:
              action: perform-action
              perform_action: script.calendar2_calendar_visible_filter
            styles: ".bubble-button-background { opacity: 1 !important; background-color: var(--sk-button-inactive) !important; } .bubble-name, .bubble-state, .bubble-sub-button-name { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important; font-weight: 600 !important; font-size: 16px !important; } .bubble-icon { color: #ffffff !important; opacity: 1 !important; }"
      - type: vertical-stack
        cards:
        - type: conditional
          conditions:
          - condition: state
            entity: input_text.holidays_calendar_filter
            state: ".*"
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            name: Holidays
            icon: mdi:bag-personal
            show_icon: true
            show_name: true
            tap_action:
              action: perform-action
              perform_action: script.holidays_calendar_visible_filter
            styles: ".bubble-button-background { opacity: 1 !important; background-color: var(--holidays-default-primary-color) !important; } .bubble-name, .bubble-state, .bubble-sub-button-name { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important; font-weight: 600 !important; font-size: 16px !important; } .bubble-icon { color: #ffffff !important; opacity: 1 !important; }"
        - type: conditional
          conditions:
          - condition: state
            entity: input_text.holidays_calendar_filter
            state_not: ".*"
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            name: Holidays
            icon: mdi:bag-personal
            show_icon: true
            show_name: true
            tap_action:
              action: perform-action
              perform_action: script.holidays_calendar_visible_filter
            styles: ".bubble-button-background { opacity: 1 !important; background-color: var(--sk-button-inactive) !important; } .bubble-name, .bubble-state, .bubble-sub-button-name { color: #ffffff !important; text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important; font-weight: 600 !important; font-size: 16px !important; } .bubble-icon { color: #ffffff !important; opacity: 1 !important; }"
      grid_options:
        columns: 18
        rows: auto
    - type: custom:bubble-card
      card_type: select
      entity: input_select.calendar_view
      show_name: true
      show_state: true
      name: Select View
      show_last_changed: false
      show_attribute: false
      grid_options:
        columns: 7
        rows: 1
    - type: custom:bubble-card
      card_type: button
      button_type: name
      card_layout: large
      name: ''
      icon: mdi:calendar-plus
      tap_action:
        action: navigate
        navigation_path: '#addcalendarevent'
      styles: "ha-card {\n  --bubble-main-background-color: #393745 !important;\n  width: 56px !important;\n  height: 56px\
        \ !important;\n  border-radius: 50% !important;\n  padding: 0 !important;\n}\n.bubble-button-card-container {\n  width:\
        \ 56px !important;\n  height: 56px !important;\n  border-radius: 50% !important;\n}\n.bubble-icon {\n  --mdc-icon-size:\
        \ 28px !important;\n  color: snow !important;\n  opacity: 1;\n}\n.bubble-icon-container {\n  background: #393745 !important;\n\
        \  display: flex;\n  justify-content: center;\n  align-items: center;\n  width: 100% !important;\n  height: 100% !important;\n\
        }\n.bubble-name-container, .bubble-name { display: none !important; }\n"
      grid_options:
        columns: 4
        rows: 1
    column_span: 10
  - type: grid
    cards:
    - type: custom:config-template-card
      entities:
      - input_text.calendar1_calendar_filter
      - input_text.calendar2_calendar_filter
      - input_text.holidays_calendar_filter
      - input_select.calendar_view
      variables:
        CAL1CAL: states['input_text.calendar1_calendar_filter']?.state
        CAL2CAL: states['input_text.calendar2_calendar_filter']?.state
        HOLCAL: states['input_text.holidays_calendar_filter']?.state
        VIEW: states['input_select.calendar_view']?.state
        STARTDAY: "(() => {\n  const calendarView = states['input_select.calendar_view']?.state;\n  if (calendarView === 'Today')\
          \ return 'today';\n  if (calendarView === 'Tomorrow') return 'tomorrow';\n  // Fallback\n  return 'monday'; // <---\
          \ UPDATE THIS IF NEEDED, valid values are: monday, tuesday, wednesday, thursday, friday, saturday, sunday\n})()\n"
        DAYS: "(() => {\n  const calendarView = states['input_select.calendar_view']?.state;\n  if (calendarView === 'Today')\
          \ return 1;\n  if (calendarView === 'Tomorrow') return 2;\n  if (calendarView === 'Week') return 7;\n  if (calendarView\
          \ === 'Biweek') return 14;\n  if (calendarView === 'Month') return 35;\n  return 7;\n})()\n"
      card:
        type: custom:week-planner-card
        calendars:
        - entity: calendar.hansel_a_hernandez_gmail_com
          name: Tony
          color: var(--calendar1-default-primary-color)
          filter: ${ CAL1CAL }
        - entity: calendar.calendar2
          name: Rachel
          color: var(--calendar2-default-primary-color)
          filter: ${ CAL2CAL }
        - entity: calendar.holidays_in_united_states
          name: Holidays
          color: var(--holidays-default-primary-color)
          filter: ${ HOLCAL }
        days: ${ DAYS }
        startingDay: ${ STARTDAY }
        showNavigation: true
        showWeekDayText: false
        startingDayOffset: 0
        hideWeekend: false
        noCardBackground: false
        compact: false
        weather:
          showCondition: true
          showTemperature: true
          showLowTemperature: false
          useTwiceDaily: true
          entity: weather.colorado_springs
        locale: en
        showLocation: true
        hidePastEvents: false
        hideDaysWithoutEvents: false
        hideTodayWithoutEvents: false
        combineSimilarEvents: true
        showLegend: false
        legendToggle: false
        card_mod:
          style: "/* === BASE SAFETY === */\n:host {\n  overflow: hidden;\n}\n\n/* === CARD BASE === */\nha-card {\n  background:\
            \ var(--sk-bg-card) !important;\n  border: 2px solid var(--sk-border-strong) !important;\n  border-radius: 24px\
            \ !important;\n  box-shadow: 0 10px 30px rgba(0,0,0,0.08),\n              0 2px 6px rgba(0,0,0,0.04) !important;\n\
            \  height: clamp(540px, 72vh, 960px) !important;\n  max-height: clamp(540px, 72vh, 960px) !important;\n  overflow:\
            \ hidden !important;\n}\n\n/* === GRID LAYOUT === */\n.container {\n  display: grid !important;\n  grid-template-columns:\
            \ repeat(7, minmax(0, 1fr)) !important;\n  grid-auto-flow: row dense !important;\n  gap: 0 !important;\n}\n\n\
            .container .navigation,\n.container .header {\n  grid-column: 1 / -1 !important;\n}\n\n/* === WEEKDAY HEADER ROW\
            \ === */\n.day.header {\n  display: block !important;\n  grid-column: auto !important;\n  margin: 0 !important;\n\
            \  padding: 0.5em 0.2em !important;\n  text-align: center !important;\n  box-sizing: border-box !important;\n\
            \  background: #f3f5f9 !important;\n  border-bottom: 1px solid var(--sk-border-cell) !important;\n}\n\n.day.header\
            \ .date .text {\n  color: var(--sk-text-primary) !important;\n  text-transform: uppercase !important;\n  letter-spacing:\
            \ 0.08em !important;\n  font-weight: 700 !important;\n}\n\n/* Saturday & Sunday header columns stay red */\n.container\
            \ > .day.header:nth-of-type(7) .date .text,\n.container > .day.header:nth-of-type(8) .date .text {\n  color: var(--sk-text-weekend)\
            \ !important;\n}\n\n/* === DAY TILES === */\n.day {\n  background: var(--sk-bg-card) !important;\n  border: 1px\
            \ solid var(--sk-border-cell) !important;\n  padding: 8px !important;\n  width: auto !important;\n  min-width:\
            \ 0 !important;\n  margin: 0 !important;\n  box-sizing: border-box !important;\n  align-self: stretch !important;\n\
            \  justify-self: stretch !important;\n}\n\n.day .date .number {\n  color: var(--sk-text-primary) !important;\n\
            \  font-weight: 700 !important;\n  font-size: 3em !important;\n  line-height: 1 !important;\n}\n\n.day .date .text\
            \ {\n  color: var(--sk-text-secondary) !important;\n  font-size: 1em !important;\n  font-weight: 500 !important;\n\
            }\n\n/* === TODAY CELL (coral circle badge on the date number) === */\n.day.today {\n  background: var(--sk-bg-card)\
            \ !important;\n  border-color: var(--sk-border-cell) !important;\n}\n.day.today .date .number {\n  color: #ffffff\
            \ !important;\n  background: var(--sk-today-fill) !important;\n  border-radius: 50% !important;\n  width: 1.4em !important;\n\
            \  height: 1.4em !important;\n  line-height: 1.4em !important;\n  display: inline-block !important;\n  text-align:\
            \ center !important;\n  padding: 0 !important;\n  font-weight: 900 !important;\n  box-shadow: 0 1px 2px rgba(0,0,0,0.15)\
            \ !important;\n}\n.day.today .date .text {\n  color: var(--sk-text-secondary) !important;\n}\n\n/* === EVENT CHIPS === */\n.event\
            \ {\n  color: #ffffff !important;\n  background-color: var(--border-color) !important;\n  border-radius: 8px !important;\n\
            \  padding: 6px 10px !important;\n  font-size: 1em !important;\n  font-weight: 600 !important;\n  line-height:\
            \ 1.15 !important;\n  text-shadow: 0 1px 2px rgba(0,0,0,0.25) !important;\n  box-shadow: 0 1px 2px rgba(0,0,0,0.15)\
            \ !important;\n  max-height: 80px !important;\n  overflow: hidden !important;\n}\n\n.event .time,\n.time {\n \
            \ color: rgba(255,255,255,0.9) !important;\n  font-size: 0.8em !important;\n}\n\n.event.past {\n  opacity: 0.55\
            \ !important;\n  filter: saturate(0.6) !important;\n  background-color: var(--border-color) !important;\n}\n\n\
            .none {\n  display: none !important;\n}\n\n\n/* === RESPONSIVE BREAKPOINTS === */\n@media (max-width: 1024px)\
            \ {\n  .day .date .number { font-size: 2em !important; }\n  .day .date .text   { font-size: 0.95em !important;\
            \ }\n}\n\n@media (max-width: 768px) {\n  .day .date .number { font-size: 1.6em !important; }\n  .day .date .text\
            \   { font-size: 0.85em !important; }\n  .event { font-size: 0.85em !important; line-height: 1.1em !important;\
            \ }\n  .time  { font-size: 0.75em !important; }\n}\n\n/* =========================================================\
            \ */\n/* === MOBILE OVERLAP FIX + TWO‑LINE WRAP FOR TITLES ======== */\n/* =========================================================\
            \ */\n@media (max-width: 480px) {\n\n  :host {\n    font-size: clamp(10px, 2.6vw, 13px) !important;\n  }\n\n \
            \ /* Condensed headers */\n  .container .header,\n  .container .navigation {\n    padding: 0.25em 0.4em !important;\n\
            \  }\n\n  /* Day tiles tighter */\n  .day {\n    padding: 0.15em !important;\n    min-width: 0 !important;\n \
            \ }\n\n  /* Smaller date numbers */\n  .day .date .number {\n    font-size: clamp(1.1em, 4.5vw, 1.4em) !important;\n\
            \    line-height: 1.1 !important;\n  }\n  .day .date .text {\n    font-size: clamp(0.72em, 3.2vw, 0.85em) !important;\n\
            \    line-height: 1.1 !important;\n  }\n\n  /* Event chip reduced */\n  .event {\n    font-size: clamp(0.72em,\
            \ 2.9vw, 0.85em) !important;\n    line-height: 1.05em !important;\n    padding: 0.25em 0.35em !important;\n  \
            \  max-height: 62px !important;\n  }\n\n  .time {\n    font-size: clamp(0.65em, 2.5vw, 0.78em) !important;\n \
            \ }\n\n  /* === TWO-LINE WRAP FOR TITLES === */\n  .event .title,\n  .event .name,\n  .event .summary,\n  .event\
            \ .location,\n  .event .desc,\n  .event .description {\n    display: -webkit-box !important;\n    -webkit-box-orient:\
            \ vertical !important;\n    -webkit-line-clamp: 2 !important;   /* <<< Two lines max */\n    overflow: hidden\
            \ !important;\n    text-overflow: ellipsis !important;\n    white-space: normal !important;\n    line-height:\
            \ 1.1em !important;\n    max-height: calc(1.1em * 2) !important;\n  }\n}\n\n/* Slightly larger phones / small\
            \ tablets */\n@media (min-width: 481px) and (max-width: 768px) {\n\n  :host {\n    font-size: clamp(11px, 2.2vw,\
            \ 14px) !important;\n  }\n\n  .event {\n    max-height: 72px !important;\n  }\n\n  .event .title,\n  .event .name,\n\
            \  .event .summary {\n    display: -webkit-box !important;\n    -webkit-line-clamp: 2 !important;\n    overflow:\
            \ hidden !important;\n  }\n}\n"
      grid_options:
        columns: 120
        rows: 1
        showDescription: false
    column_span: 10
  - type: grid
    cards:
    - type: vertical-stack
      cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#addcalendarevent'
        button_type: name
        name: Add Calendar Event
        icon: mdi:calendar-plus
        show_icon: true
        show_name: true
        styles: ".bubble-button-card-container {\n  background: \n  ${hass.states['input_select.calendar_select'].state ==\
          \ 'calendar1' ? 'var(--calendar1-default-primary-color)' \n  : hass.states['input_select.calendar_select'].state\
          \ == 'calendar2' ? 'var(--calendar2-default-primary-color)' \n  : hass.states['input_select.calendar_select'].state\
          \ == 'calendar3' ? 'var(--calendar3-default-primary-color)' \n  : hass.states['input_select.calendar_select'].state\
          \ == 'calendar4' ? 'var(--calendar4-default-primary-color)' \n  : hass.states['input_select.calendar_select'].state\
          \ == 'Family' ? 'var(--family-default-primary-color)' \n  : 'gray'} !important;\n}\n"
      - type: vertical-stack
        cards:
        - type: entities
          entities:
          - entity: input_select.calendar_select
          - entity: input_text.calendar_event_title
            name: Event Title
          - entity: input_text.calendar_event_description
            name: Event Description
          - entity: input_boolean.calendar_all_day_event
            name: All Day Event
          title: Add Calendar Event
          state_color: false
        - type: conditional
          conditions:
          - entity: input_boolean.calendar_all_day_event
            state: 'off'
          card:
            type: entities
            entities:
            - entity: input_datetime.calendar_event_start
              name: Start Time
            - entity: input_datetime.calendar_event_end
              name: End Time
        - type: conditional
          conditions:
          - entity: input_boolean.calendar_all_day_event
            state: 'on'
          card:
            type: entities
            entities:
            - entity: input_datetime.calendar_day_event_start
              name: Event Start Date
            - entity: input_datetime.calendar_day_event_end
              name: Event End Date
        - type: custom:button-card
          name: Add Event to Calendar
          tap_action:
            action: call-service
            service: script.add_google_calendar_event
          styles:
            card:
            - background-color: "[[[\n  if (states['input_select.calendar_select'].state == 'calendar1') return \"var(--calendar1-default-primary-color)\"\
                ;\n  if (states['input_select.calendar_select'].state == 'calendar2') return \"var(--calendar2-default-primary-color)\"\
                ;\n  if (states['input_select.calendar_select'].state == 'calendar3') return \"var(--calendar3-default-primary-color)\"\
                ;\n  if (states['input_select.calendar_select'].state == 'calendar4') return \"var(--calendar4-default-primary-color)\"\
                ;\n  if (states['input_select.calendar_select'].state == 'Family') return \"var(--family-default-primary-color)\"\
                ;\n  return \"gray\";\n]]]                \n"
  cards: []
  icon: mdi:calendar-blank-multiple
